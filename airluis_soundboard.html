<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AirLuis">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="AirLuis">
<meta name="theme-color" content="#0B1F3A">
<title>AirLuis · KC-2011</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;500&display=swap');

  :root {
    --navy:    #0B1F3A;
    --navy2:   #0f2847;
    --navy3:   #162f52;
    --gold:    #C9A84C;
    --gold2:   #e8c46a;
    --green:   #22C55E;
    --red:     #EF4444;
    --white:   #F0F4F8;
    --gray:    #8FA3BF;
    --dgray:   #374151;
    --mono:    'Share Tech Mono', monospace;
    --display: 'Orbitron', sans-serif;
    --body:    'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--navy);
    font-family: var(--body);
    color: var(--white);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04), transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.007) 2px, rgba(255,255,255,0.007) 4px);
    pointer-events: none; z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    height: 100dvh;
    display: flex; flex-direction: column;
    padding:
      env(safe-area-inset-top, 0)
      env(safe-area-inset-right, 0)
      env(safe-area-inset-bottom, 0)
      env(safe-area-inset-left, 0);
  }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 7px;
    border-bottom: 1px solid rgba(201,168,76,0.25);
    background: rgba(11,31,58,0.95);
    flex-shrink: 0;
  }
  .airline-name {
    font-family: var(--display); font-size: 17px; font-weight: 800;
    color: var(--gold); letter-spacing: 3px; line-height: 1;
  }
  .flight-info {
    font-family: var(--mono); font-size: 8px;
    color: var(--gray); letter-spacing: 1.5px; margin-top: 3px;
  }
  .clock {
    font-family: var(--mono); font-size: 17px;
    color: var(--gold2); letter-spacing: 2px;
  }
  .date-display {
    font-family: var(--mono); font-size: 7.5px;
    color: var(--gray); letter-spacing: 1px; text-align: right; margin-top: 2px;
  }

  /* STATUS BAR */
  .status-bar {
    display: flex; align-items: center; gap: 7px;
    padding: 4px 14px;
    background: rgba(15,40,71,0.85);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.8); }
  }
  .status-text {
    font-family: var(--mono); font-size: 8.5px;
    color: var(--gray); letter-spacing: 1.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .status-text span { color: var(--gold); }

  /* GRID — 2 cols × 4 rows */
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(4, 1fr);
    gap: 7px;
    padding: 7px;
    overflow: hidden;
  }

  /* BUTTON CARD */
  .btn-card {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 10px;
    background: linear-gradient(145deg, var(--navy2), var(--navy3));
    border: 1px solid rgba(201,168,76,0.18);
    cursor: pointer; overflow: hidden;
    transition: transform 0.08s ease, border-color 0.2s ease;
    user-select: none;
    gap: 4px; padding: 8px 6px 18px;
  }
  .btn-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.07), transparent 70%);
    pointer-events: none;
  }
  /* corner screws */
  .btn-card::after {
    content: '';
    position: absolute; top: 5px; right: 5px;
    width: 4px; height: 4px; border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.28);
    background: rgba(201,168,76,0.08);
  }
  .screw-bl {
    position: absolute; bottom: 5px; left: 5px;
    width: 4px; height: 4px; border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.28);
    background: rgba(201,168,76,0.08);
    pointer-events: none;
  }
  .btn-card:active { transform: scale(0.95); border-color: var(--gold); }
  .btn-card.playing {
    border-color: var(--gold);
    background: linear-gradient(145deg, #162f52, #1a3960);
    box-shadow: 0 0 16px rgba(201,168,76,0.22), inset 0 0 16px rgba(201,168,76,0.04);
  }

  /* LED */
  .led {
    position: absolute; top: 6px; left: 6px;
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.25);
    transition: all 0.2s ease;
  }
  .btn-card.playing .led {
    background: var(--green);
    box-shadow: 0 0 7px var(--green);
    animation: led-blink 0.8s ease-in-out infinite;
  }
  .btn-card.loaded .led {
    background: rgba(201,168,76,0.45);
    border-color: var(--gold);
  }
  @keyframes led-blink {
    0%,100% { opacity:1; } 50% { opacity:0.25; }
  }

  /* Channel number */
  .btn-number {
    position: absolute; top: 6px; right: 17px;
    font-family: var(--mono); font-size: 7.5px;
    color: rgba(201,168,76,0.35); letter-spacing: 1px;
  }

  /* Icon */
  .btn-icon {
    font-size: 22px; line-height: 1;
    filter: drop-shadow(0 0 5px rgba(201,168,76,0.25));
    transition: transform 0.12s ease;
  }
  .btn-card:active .btn-icon { transform: scale(0.88); }
  .btn-card.playing .btn-icon { filter: drop-shadow(0 0 9px rgba(201,168,76,0.55)); }

  /* Labels */
  .btn-label-es {
    font-family: var(--display); font-size: 7.5px; font-weight: 600;
    letter-spacing: 1.2px; color: var(--gold);
    text-align: center; line-height: 1.3;
  }
  .btn-label-en {
    font-family: var(--mono); font-size: 6.5px;
    color: var(--gray); letter-spacing: 0.8px; text-align: center;
  }

  /* File name */
  .btn-file {
    position: absolute; bottom: 18px;
    font-family: var(--mono); font-size: 6px;
    color: rgba(201,168,76,0.45); letter-spacing: 0.5px;
    max-width: 90%; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  /* Progress bar */
  .progress-bar {
    position: absolute; bottom: 0; left: 0;
    height: 2px; background: var(--gold); width: 0%;
    transition: width 0.1s linear;
    border-radius: 0 0 10px 10px;
  }

  /* Load button */
  .load-btn {
    position: absolute; bottom: 5px; right: 6px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 3px; color: var(--gold);
    font-family: var(--mono); font-size: 6px;
    letter-spacing: 0.8px; padding: 1.5px 4px;
    cursor: pointer; z-index: 2;
    transition: background 0.2s;
  }
  .load-btn:active { background: rgba(201,168,76,0.22); }
  .file-input { display: none; }

  /* FOOTER */
  .footer {
    padding: 5px 14px;
    padding-bottom: calc(5px + env(safe-area-inset-bottom, 0px));
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(201,168,76,0.15);
    background: rgba(11,31,58,0.95);
    flex-shrink: 0;
  }
  .footer-left {
    font-family: var(--mono); font-size: 7.5px;
    color: var(--gray); letter-spacing: 1px;
  }
  .master-stop {
    display: flex; align-items: center; gap: 5px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.28);
    border-radius: 5px; padding: 4px 9px;
    cursor: pointer; transition: background 0.2s;
  }
  .master-stop:active { background: rgba(239,68,68,0.22); }
  .master-stop-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); }
  .master-stop-text {
    font-family: var(--mono); font-size: 7.5px;
    color: var(--red); letter-spacing: 1.2px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 72px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(22,47,82,0.96);
    border: 1px solid var(--gold); border-radius: 7px;
    padding: 7px 14px;
    font-family: var(--mono); font-size: 9.5px;
    color: var(--gold); letter-spacing: 1px;
    opacity: 0; pointer-events: none;
    transition: all 0.25s ease; z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="airline-name">AIRLUIS</div>
      <div class="flight-info">FL KC-2011 · AUDIO CONTROL PANEL</div>
    </div>
    <div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-display" id="dateDisplay">--- -- ----</div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-dot"></div>
    <div class="status-text" id="statusText">SISTEMA LISTO · <span>CARGUE ARCHIVOS DE AUDIO</span></div>
  </div>

  <!-- 8-BUTTON GRID -->
  <div class="grid" id="grid"></div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-left" id="footerStatus">STAND BY</div>
    <div class="master-stop" onclick="stopAll()">
      <div class="master-stop-dot"></div>
      <div class="master-stop-text">STOP ALL</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BUTTONS = [
  { icon:'⚙️', es:'APU START',      en:'ENGINE SYSTEM',    ch:'01' },
  { icon:'🔔', es:'CINTURÓN',        en:'FASTEN SEATBELT',  ch:'02' },
  { icon:'📡', es:'GPWS',            en:'APPROACH CALLOUTS',ch:'03' },
  { icon:'🎙️', es:'SAFETY BRIEF',   en:'PA ANNOUNCEMENT',  ch:'04' },
  { icon:'🎵', es:'BOARDING',        en:'CABIN MUSIC',      ch:'05' },
  { icon:'🔕', es:'PA CHIME',        en:'ATTENTION SIGNAL', ch:'06' },
  { icon:'🌙', es:'DESCENSO',        en:'CABIN DIM PA',     ch:'07' },
  { icon:'👋', es:'FAREWELL',        en:'DEPARTURE PA',     ch:'08' },
];

const audio    = new Array(8).fill(null);
const names    = new Array(8).fill('');
const playing  = new Array(8).fill(false);
const timers   = new Array(8).fill(null);

// Build grid
const grid = document.getElementById('grid');
BUTTONS.forEach((b, i) => {
  grid.innerHTML += `
  <div class="btn-card" id="card-${i}" onclick="handleClick(${i})">
    <div class="led" id="led-${i}"></div>
    <div class="screw-bl"></div>
    <div class="btn-number">${b.ch}</div>
    <div class="btn-icon">${b.icon}</div>
    <div class="btn-label-es">${b.es}</div>
    <div class="btn-label-en">${b.en}</div>
    <div class="btn-file" id="file-${i}">SIN AUDIO</div>
    <div class="progress-bar" id="prog-${i}"></div>
    <button class="load-btn" onclick="triggerLoad(event,${i})">LOAD</button>
    <input type="file" accept="audio/*" class="file-input" id="inp-${i}" onchange="loadAudio(${i},this)">
  </div>`;
});

// Clock
function tick() {
  const n = new Date();
  const pad = v => String(v).padStart(2,'0');
  document.getElementById('clock').textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  const D=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('dateDisplay').textContent = `${D[n.getDay()]} ${pad(n.getDate())} ${M[n.getMonth()]} ${n.getFullYear()}`;
}
tick(); setInterval(tick, 1000);

// Load
function triggerLoad(e, i) { e.stopPropagation(); document.getElementById(`inp-${i}`).click(); }

function loadAudio(i, input) {
  const file = input.files[0];
  if (!file) return;
  if (audio[i]) { audio[i].pause(); URL.revokeObjectURL(audio[i].src); }
  const a = new Audio(URL.createObjectURL(file));
  a.preload = 'auto';
  a.onended = () => setPlaying(i, false);
  audio[i] = a;
  names[i] = file.name.replace(/\.[^.]+$/, '').substring(0, 20);
  document.getElementById(`file-${i}`).textContent = names[i];
  document.getElementById(`card-${i}`).classList.add('loaded');
  showToast(`CH${BUTTONS[i].ch} · CARGADO`);
  setStatus(`CH${BUTTONS[i].ch} · ${names[i]} · LISTO`);
}

// Play/stop
function handleClick(i) {
  if (!audio[i]) { showToast(`CH${BUTTONS[i].ch} · CARGUE UN ARCHIVO`); return; }
  playing[i] ? stopChannel(i) : playChannel(i);
}

function playChannel(i) {
  for (let j = 0; j < 8; j++) if (j !== i && playing[j]) stopChannel(j);
  audio[i].currentTime = 0;
  audio[i].play().catch(() => showToast('ERROR · AUDIO NO DISPONIBLE'));
  setPlaying(i, true);
  setStatus(`▶ CH${BUTTONS[i].ch} · ${names[i]}`);
  timers[i] = setInterval(() => {
    if (!audio[i].duration) return;
    document.getElementById(`prog-${i}`).style.width =
      (audio[i].currentTime / audio[i].duration * 100) + '%';
  }, 100);
}

function stopChannel(i) {
  if (audio[i]) { audio[i].pause(); audio[i].currentTime = 0; }
  clearInterval(timers[i]);
  document.getElementById(`prog-${i}`).style.width = '0%';
  setPlaying(i, false);
  setStatus('STAND BY');
}

function stopAll() {
  for (let i = 0; i < 8; i++) stopChannel(i);
  showToast('STOP ALL · SISTEMA EN ESPERA');
}

function setPlaying(i, state) {
  playing[i] = state;
  const card = document.getElementById(`card-${i}`);
  card.classList.toggle('playing', state);
  if (!state) {
    document.getElementById(`prog-${i}`).style.width = '0%';
    clearInterval(timers[i]);
  }
}

function setStatus(msg) {
  document.getElementById('statusText').innerHTML =
    msg.replace(/(CH\d+|▶|STOP|LISTO|STAND BY)/g, '<span>$1</span>');
  document.getElementById('footerStatus').textContent = msg.substring(0,35);
}

let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
